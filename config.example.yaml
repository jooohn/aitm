# aitm configuration file
# Copy to ~/.aitm/config.yaml and edit to match your setup.

repositories:
  - path: /path/to/git-repository

agent:
  provider: claude
  # Optional: override the default model used by your agent CLI.
  # model: sonnet
  # Optional: override the CLI executable path or command name.
  # command: /opt/homebrew/bin/claude
  # Optional: permission mode for the agent.
  # plan  - read-only, no mutations (Claude: plan, Codex: read-only sandbox)
  # edit  - edit files in workspace (Claude: acceptEdits, Codex: workspace-write sandbox) [default]
  # full  - full access incl. network (Claude: bypassPermissions, Codex: danger-full-access sandbox + network)
  # permission_mode: edit

workflows:
  development-flow:
    inputs:
      feature-description:
        label: Feature Description
        description: "Describe the feature you want to implement"
        required: true
    initial_step: plan
    steps:
      plan:
        goal: |
          Read the task goal. If the spec is ambiguous or missing, ask clarifying
          questions and document a clear plan in PLAN.md. Otherwise, document your
          understanding and proceed.
        agent:
          provider: codex
          model: gpt-5.4
        transitions:
          - step: plan
            when: "specs need clarification or the plan is not yet documented"
          - step: implement
            when: "a clear plan is documented in PLAN.md"
          - terminal: failure
            when: "the task is out of scope or cannot be planned"

      implement:
        goal: |
          Implement the plan documented in PLAN.md. Write production-quality code.
        agent:
          # provider is optional here; this step inherits the top-level provider
          # and only overrides the model.
          model: sonnet-4.5
        transitions:
          - step: implement
            when: "implementation is incomplete"
          - step: test
            when: "implementation is complete and ready for testing"
          - terminal: failure
            when: "implementation is blocked and cannot proceed"

      test:
        goal: |
          Run the test suite. Fix any failures. Ensure all tests pass.
        transitions:
          - step: implement
            when: "test failures reveal implementation issues"
          - step: review
            when: "all tests pass"
          - terminal: failure
            when: "tests cannot be fixed without reconsidering the plan"

      review:
        goal: |
          Review the diff. Check for correctness, style, and completeness.
          Request changes if needed.
        transitions:
          - step: implement
            when: "review found issues that require code changes"
          - step: approve
            when: "code is ready to commit"
          - terminal: failure
            when: "changes should be abandoned"

      approve:
        type: manual-approval
        transitions:
          - step: commit-push-pr
            when: "approved"
          - step: implement
            when: "rejected"

      commit-push-pr:
        goal: |
          Stage all relevant changes, create a well-formed git commit, push the
          branch to the remote repository, and open a pull request.
        agent:
          permission_mode: full
        transitions:
          - terminal: success
            when: "pull request was created successfully"
          - terminal: failure
            when: "commit, push, or PR creation failed and cannot be resolved"
